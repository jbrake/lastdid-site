<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% seo %}
    {% if page.url == "/" %}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "MobileApplication",
                "@id": "{{ site.url }}/#app",
                "name": "LastDid",
                "alternateName": "LastDid by Brake Networks",
                "operatingSystem": "iOS 16+",
                "applicationCategory": ["LifestyleApplication", "ProductivityApplication"],
                "description": "A calm, mindful activity tracker for iOS. Track what you've done, not what you need to do — no guilt, no nagging, just gentle awareness of life's rhythms.",
                "url": "{{ site.url }}/",
                "downloadUrl": "https://apps.apple.com/us/app/lastdid/id6759917609",
                "installUrl": "https://apps.apple.com/us/app/lastdid/id6759917609",
                "datePublished": "2026-04-14",
                "image": "{{ site.url }}/assets/images/og-default.png",
                "screenshot": [
                    "{{ site.url }}/assets/images/tasks-grid.png",
                    "{{ site.url }}/assets/images/history.png",
                    "{{ site.url }}/assets/images/heatmap-month.png",
                    "{{ site.url }}/assets/images/folders.png"
                ],
                "author": { "@id": "{{ site.url }}/#org" },
                "publisher": { "@id": "{{ site.url }}/#org" },
                "offers": {
                    "@type": "Offer",
                    "price": "0",
                    "priceCurrency": "USD",
                    "availability": "https://schema.org/InStock"
                }
            },
            {
                "@type": "Organization",
                "@id": "{{ site.url }}/#org",
                "name": "Brake Networks",
                "url": "https://brakenetworks.com",
                "logo": "{{ site.url }}/assets/images/og-default.png",
                "sameAs": [
                    "https://apps.apple.com/us/app/lastdid/id6759917609",
                    "https://github.com/jbrake"
                ]
            },
            {
                "@type": "WebSite",
                "@id": "{{ site.url }}/#website",
                "url": "{{ site.url }}/",
                "name": "LastDid",
                "publisher": { "@id": "{{ site.url }}/#org" },
                "inLanguage": "en"
            }
        ]
    }
    </script>
    {% elsif page.layout == "post" %}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "Article",
                "headline": {{ page.title | jsonify }},
                "description": {{ page.description | jsonify }},
                "datePublished": "{{ page.date | date_to_xmlschema }}",
                "url": "{{ site.url }}{{ page.url }}",
                "author": {
                    "@type": "Organization",
                    "name": "Brake Networks",
                    "url": "https://brakenetworks.com"
                },
                "publisher": {
                    "@type": "Organization",
                    "name": "Brake Networks",
                    "url": "https://brakenetworks.com"
                }
            },
            {
                "@type": "BreadcrumbList",
                "itemListElement": [
                    {
                        "@type": "ListItem",
                        "position": 1,
                        "name": "Home",
                        "item": "{{ site.url }}/"
                    },
                    {
                        "@type": "ListItem",
                        "position": 2,
                        "name": "Blog",
                        "item": "{{ site.url }}/blog/"
                    },
                    {
                        "@type": "ListItem",
                        "position": 3,
                        "name": {{ page.title | jsonify }},
                        "item": "{{ site.url }}{{ page.url }}"
                    }
                ]
            }
        ]
    }
    </script>
    {% endif %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7DCN91MRHT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7DCN91MRHT');
    </script>
</head>
<body>
    {% include header.html %}
    <main>
        {{ content }}
    </main>
    {% include footer.html %}
</body>
</html>
