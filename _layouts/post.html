---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1>{{ page.title }}</h1>
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <footer class="post-footer">
        <div class="post-cta">
            <p>Ready to start tracking?</p>
            <a href="https://apps.apple.com/us/app/lastdid/id6759917609" class="store-badge">
                <img src="{{ '/assets/images/app-store-badge.svg' | relative_url }}" alt="Download on the App Store">
            </a>
        </div>
        <a href="{{ '/blog' | relative_url }}" class="back-link">&larr; More articles</a>
    </footer>
</article>
